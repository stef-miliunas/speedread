<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <title>SpeedRead</title>
    <meta name="description" content="RSVP speed reader. One word, one point, no eye movement." />
    <meta name="theme-color" content="#0b0e14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SpeedRead" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="64x64" href="./icons/favicon-64.png" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <script>
      // Apply saved theme before first paint to avoid a flash.
      try {
        var s = JSON.parse(localStorage.getItem('speedread:settings') || '{}');
        document.documentElement.dataset.theme = s.theme === 'light' ? 'light' : 'dark';
      } catch (e) {
        document.documentElement.dataset.theme = 'dark';
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
